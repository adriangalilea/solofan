name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build SoloFan for macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build SoloFan
        run: |
          xcodebuild \
            -project fan.xcodeproj \
            -scheme fan \
            -configuration Release \
            -derivedDataPath build \
            clean build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

          BUILT_APP="build/Build/Products/Release/SoloFan.app"

          if [ ! -d "$BUILT_APP" ]; then
            echo "Error: Built app not found at $BUILT_APP"
            find build -name "*.app" -type d
            exit 1
          fi

          mkdir -p release
          cp -R "$BUILT_APP" release/SoloFan.app

      - name: Sign application
        run: |
          chmod +x release/SoloFan.app/Contents/MacOS/*
          codesign --force --deep --options runtime --sign - release/SoloFan.app

      - name: Create ZIP archive
        run: |
          cd release
          zip -r ../solofan-v${{ steps.version.outputs.version }}-macos.zip SoloFan.app -x "*.DS_Store"
          cd ..
          shasum -a 256 solofan-v${{ steps.version.outputs.version }}-macos.zip > solofan-v${{ steps.version.outputs.version }}-macos.zip.sha256

      - name: Create styled DMG
        run: |
          DMG_WIDTH=640
          DMG_HEIGHT=480

          mkdir -p dmg_source/.background
          cp -R release/SoloFan.app dmg_source/
          ln -s /Applications dmg_source/Applications

          sips -z $DMG_HEIGHT $DMG_WIDTH assets/installer_bg.png --out dmg_source/.background/background.png

          hdiutil create -volname "SoloFan" \
            -srcfolder dmg_source \
            -ov -format UDRW \
            -size 200m \
            temp_solofan.dmg

          MOUNT_DIR=$(hdiutil attach -readwrite -noverify temp_solofan.dmg | grep "Volumes" | awk '{print $3}')

          osascript <<EOF
          tell application "Finder"
            tell disk "SoloFan"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {100, 100, $((100 + DMG_WIDTH)), $((100 + DMG_HEIGHT))}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 128
              set background picture of viewOptions to file ".background:background.png"
              set position of item "SoloFan.app" of container window to {160, 280}
              set position of item "Applications" of container window to {480, 280}
              close
              open
              update without registering applications
              delay 2
            end tell
          end tell
          EOF

          sync
          hdiutil detach "$MOUNT_DIR"

          hdiutil convert temp_solofan.dmg \
            -format UDZO \
            -imagekey zlib-level=9 \
            -o solofan-v${{ steps.version.outputs.version }}-macos.dmg

          rm temp_solofan.dmg
          shasum -a 256 solofan-v${{ steps.version.outputs.version }}-macos.dmg > solofan-v${{ steps.version.outputs.version }}-macos.dmg.sha256

      - name: Generate release notes
        run: |
          cat > release_notes.md << EOF
          ## SoloFan v${{ steps.version.outputs.version }}

          ### Highlights
          - SoloFan rebrand (\`SoloFan.app\`)
          - Liquid Glass settings UI (macOS 26)
          - Per-fan SMC RPM limits and optional per-fan sliders
          - Menu bar context menu: Settings, Hide Icon, Close App

          ### Installation

          **Quick install:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/mohamadlounnas/ffan/main/scripts/install.sh | bash
          \`\`\`

          **Manual:**
          1. Download \`solofan-v${{ steps.version.outputs.version }}-macos.dmg\` or ZIP
          2. Drag **SoloFan.app** to /Applications/
          3. Install the helper when prompted

          ### Requirements
          - macOS **26.1** or later
          - Apple Silicon or Intel

          ### SHA256
          \`\`\`
          $(cat solofan-v${{ steps.version.outputs.version }}-macos.zip.sha256)
          $(cat solofan-v${{ steps.version.outputs.version }}-macos.dmg.sha256)
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: SoloFan v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            solofan-v${{ steps.version.outputs.version }}-macos.zip
            solofan-v${{ steps.version.outputs.version }}-macos.zip.sha256
            solofan-v${{ steps.version.outputs.version }}-macos.dmg
            solofan-v${{ steps.version.outputs.version }}-macos.dmg.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: solofan-dev-build
          path: |
            solofan-v${{ steps.version.outputs.version }}-macos.zip
            solofan-v${{ steps.version.outputs.version }}-macos.dmg
          retention-days: 30
